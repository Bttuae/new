<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    color:#fff;
}

/* Animated Background */

body::before,
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(80px);
    animation:move 12s infinite alternate ease-in-out;
}

body::before{
    background:#00c6ff;
    top:-250px;
    left:-200px;
}

body::after{
    background:#ff00aa;
    bottom:-250px;
    right:-200px;
}

@keyframes move{
    to{
        transform:translate(100px,80px) scale(1.2);
    }
}

/* Card */

.container{
    width:90%;
    max-width:850px;
    padding:60px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 25px 50px rgba(0,0,0,.4);
    text-align:center;
    position:relative;
    z-index:2;
}

.logo{
    font-size:32px;
    font-weight:700;
    letter-spacing:4px;
    color:#fff;
}

h1{
    margin-top:20px;
    font-size:64px;
    font-weight:700;
}

.highlight{
    color:#38bdf8;
}

p{
    margin:20px auto 40px;
    max-width:650px;
    color:#d7d7d7;
    line-height:1.7;
}

/* Countdown */

.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.time-box{
    width:110px;
    padding:20px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
}

.time-box h2{
    font-size:38px;
}

.time-box span{
    color:#cfcfcf;
    font-size:14px;
}

/* Email */

form{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

input{
    width:350px;
    padding:16px;
    border:none;
    border-radius:50px;
    outline:none;
    font-size:16px;
}

button{
    padding:16px 35px;
    border:none;
    border-radius:50px;
    background:#38bdf8;
    color:#fff;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    background:#0ea5e9;
    box-shadow:0 10px 25px rgba(56,189,248,.5);
}

/* Social */

.social{
    margin-top:40px;
}

.social a{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:50px;
    height:50px;
    margin:0 8px;
    border-radius:50%;
    text-decoration:none;
    color:#fff;
    background:rgba(255,255,255,.1);
    transition:.3s;
    font-size:20px;
}

.social a:hover{
    background:#38bdf8;
    transform:translateY(-6px);
}

.footer{
    margin-top:30px;
    color:#bbb;
    font-size:14px;
}

@media(max-width:768px){

.container{
padding:35px 20px;
}

h1{
font-size:42px;
}

.time-box{
width:90px;
}

.time-box h2{
font-size:30px;
}

input{
width:100%;
}

}

.logo img{
    width:180px;      /* Adjust as needed */
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto;
}
</style>

<script src="https://kit.fontawesome.com/6d2ea823d0.js" crossorigin="anonymous"></script>

</head>
<body>

<div class="container">

    <div class="logo">
        <img src="images/icon.png" alt="Logo">
    </div>

<h1>We're <span class="highlight">Coming Soon</span></h1>

<p>
Something amazing is under construction. We're working hard to launch our new website with exciting features.
Stay connected and be the first to know when we go live.
</p>






<div class="footer">
© 2026 BESTEAM UAE. All Rights Reserved.
</div>

</div>

<script>

// Set launch date (Change this date)
const launchDate = new Date("December 31, 2026 23:59:59").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if(distance<0){
clearInterval(timer);

document.querySelector(".countdown").innerHTML =
"<h2>🚀 We Are Live!</h2>";
}

},1000);

</script>

</body>
</html>
